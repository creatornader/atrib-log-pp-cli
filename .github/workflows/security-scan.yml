name: security-scan

# Security scanning for atrib-log-pp-cli.
#
# Caller for the reusable workflow at creatornader/oss-security-scan,
# which runs typos + gitleaks + trufflehog + osv-scanner. OSV-Scanner
# is gated to the scheduled run (Sunday 09:00 UTC) so PRs and pushes
# stay fast.
#
# pre-commit job runs textleaks at PR time as CI-side enforcement of
# the local hook in .pre-commit-config.yaml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  scan:
    uses: creatornader/oss-security-scan/.github/workflows/oss-security-scan.yml@v0.2.0
    with:
      run-osv-scanner: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

  pre-commit:
    name: pre-commit (textleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: pre-commit/action@v3.0.1
